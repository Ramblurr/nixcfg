name: dispatch
on:
  push:
    branches:
      - main
jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger nixcfg-private workflow
        env:
          GH_TOKEN: ${{ secrets.NIXCFG_PRIVATE_REPO_TOKEN }}
        run: |
          test -n "${GH_TOKEN}"
          curl -fsSL \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2026-03-10" \
            https://api.github.com/repos/ramblurr/nixcfg-private/actions/workflows/update-from-public.yml/dispatches \
            -d '{"ref":"main","inputs":{"source_sha":"${{ github.sha }}","source_ref":"${{ github.ref }}","source_repository":"${{ github.repository }}"}}'
