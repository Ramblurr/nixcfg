<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Fairybox offline</title>
    <link rel="stylesheet" href="/.fairybox-offline/style.css">
  </head>
  <body>
    <main class="card">
      <img
        class="jukebox"
        src="/.fairybox-offline/jukebox.png"
        alt="The Fairybox jukebox"
        width="1024"
        height="1024"
      >
      <p class="label">Fairybox</p>
      <h1>The Fairybox is not online</h1>
      <p class="message">
        Its Raspberry Pi is switched off or unavailable right now. Please try again when the
        Fairybox is awake.
      </p>
      <a class="retry" href="/">Try again</a>
    </main>
  </body>
</html>
